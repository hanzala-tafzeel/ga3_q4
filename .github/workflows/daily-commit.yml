name: Daily Repository Update

on:
  schedule:
    - cron: '15 3 * * *'   # runs daily at 03:15 UTC
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Step by 23f2004513@ds.study.iitm.ac.in
        run: echo "Workflow executed by DevSync automation"

      - name: Make Daily Commit
        run: |
          echo "Daily update $(date)" >> daily-log.txt
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated daily commit"
          git push
