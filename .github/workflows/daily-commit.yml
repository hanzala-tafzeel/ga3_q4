name: Daily Repository Update

on:
  schedule:
    - cron: '17 3 * * *'   # runs daily at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Step by 23f2004513@ds.study.iitm.ac.in
        run: echo "DevSync automated workflow"

      - name: Make Daily Commit
        run: |
          echo "Daily update $(date)" >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Automated daily commit $(date)" || echo "No changes"
          git push
